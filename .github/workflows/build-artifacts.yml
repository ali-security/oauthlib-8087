name: Build artifacts

on:
  push:
  pull_request:
  workflow_dispatch:

# PyPI time machine pinned to the 3.2.0 release date, so build tooling
# resolves to the versions available when this version shipped.
env:
  PIP_INDEX_URL: "https://:2022-01-29T21:59:35.381925Z@time-machines-pypi.sealsecurity.io/"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install build tooling
        run: python -m pip install --upgrade --force-reinstall pip setuptools wheel

      - name: Build wheel and sdist
        run: python setup.py sdist bdist_wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oauthlib-dist
          path: dist/*
          if-no-files-found: error
